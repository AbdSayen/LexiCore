<html lang="en">
<head>

  <style>
    * {

      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0B1120;
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      color: #E2E8F0;
      padding: 1rem;
      padding-bottom: 2rem;
    }

    /* main container */
    .app-container {
      max-width: 650px;
      margin: 0 auto;
    }

    /* header */
    .header {
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #C084FC, #60A5FA);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .sub {
      font-size: 0.8rem;
      color: #94A3B8;
      margin-top: 4px;
    }

    /* cards */
    .card {
      background: #1E293B;
      border-radius: 2rem;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
      border: 1px solid #334155;
      transition: all 0.2s;
    }

    /* filter bar & stats */
    .stats-row {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 1rem;
      background: #0F172A;
      padding: 0.9rem;
      border-radius: 2rem;
      border: 1px solid #334155;
    }
    .stat-badge {
      background: #1E293B;
      padding: 0.4rem 1rem;
      border-radius: 3rem;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .stat-badge span {
      color: #FACC15;
      font-weight: 700;
    }

    /* unit buttons grid */
    .units-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 1.2rem;
    }
    .unit-chip {
      background: #0F172A;
      border: 1px solid #334155;
      padding: 0.5rem 1rem;
      border-radius: 3rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s linear;
      color: #CBD5E1;
    }
    .unit-chip.active {
      background: #3B82F6;
      border-color: #3B82F6;
      color: white;
      box-shadow: 0 0 6px #3b82f670;
    }
    .unit-chip[data-selected="true"] {
      background: #2D3A5E;
      border-color: #818CF8;
      color: #E0E7FF;
    }

    /* mode selector */
    .mode-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 1.4rem;
      background: #0F172A;
      padding: 0.8rem;
      border-radius: 2rem;
    }
    .mode-btn {
      flex: 1;
      text-align: center;
      background: #1E293B;
      border: none;
      padding: 0.6rem 0;
      border-radius: 2rem;
      font-weight: 600;
      color: #CBD5E1;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .mode-btn.active-mode {
      background: #2D374B;
      color: #FACC15;
      box-shadow: inset 0 0 0 1px #FACC1540, 0 2px 5px #00000030;
    }

    /* study card */
    .study-card {
      background: #111827;
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      text-align: center;
      border: 1px solid #2D3A5E;
      box-shadow: 0 15px 30px -10px black;
    }
    .word-original {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      word-break: break-word;
      margin-bottom: 1rem;
      color: #F1F5F9;
    }
    .part-speech {
      font-size: 1rem;
      background: #2D374B;
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 3rem;
      margin-bottom: 1rem;
      color: #A5B4FC;
    }
    .reveal-area {
      background: #0F172A;
      border-radius: 1.5rem;
      padding: 1rem;
      margin: 1.5rem 0;
      transition: all 0.2s ease;
    }
    .translation {
      font-size: 1.6rem;
      font-weight: 600;
      color: #FACC15;
      margin-bottom: 0.6rem;
    }
    .example {
      font-style: italic;
      color: #94A3B8;
      font-size: 0.9rem;
      border-top: 1px dashed #334155;
      padding-top: 0.6rem;
    }
    .hidden {
      display: none;
    }
    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }
    .btn {
      border: none;
      padding: 0.7rem 1.6rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.1s linear;
      background: #1E293B;
      color: white;
    }
    .btn-know {
      background: #10B981;
      box-shadow: 0 2px 8px #10B98140;
    }
    .btn-dontknow {
      background: #EF4444;
      box-shadow: 0 2px 8px #EF444440;
    }
    .btn-show {
      background: #3B82F6;
      width: 100%;
      margin-bottom: 0.8rem;
    }
    .reset-stat {
      background: #334155;
      margin-top: 0.5rem;
      width: auto;
      font-size: 0.75rem;
      padding: 0.4rem 1rem;
    }
    .progress-text {
      margin-top: 0.8rem;
      font-size: 0.8rem;
      color: #94A3B8;
    }
    footer {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 1.5rem;
      color: #4B5563;
    }
    button:active {
      transform: scale(0.97);
    }
    @media (max-width: 500px) {
      body { padding: 0.8rem; }
      .word-original { font-size: 1.8rem; }
      .translation { font-size: 1.3rem; }
      .btn { padding: 0.6rem 1.2rem; }
    }
  </style>
</head>

    <div id="revealBlock" class="reveal-area hidden">

    </div>
    <button id="revealBtn" class="btn btn-show">🔎 SHOW TRANSLATION & EXAMPLE</button>
    <div class="action-buttons" id="actionButtons" style="display: none;">

      <button id="dontKnowBtn" class="btn btn-dontknow">❌ DON'T KNOW</button>

    <div id="progressMsg" class="progress-text"></div>
  </div>
  <footer>⚡ progress saved locally | mark known / unknown</footer>
</div>

  // ---------- GLOBALS ----------
  let vocabulary = [];       // full array
  let learnedSet = new Set(); // stores word IDs that user marked as 'know'
  let currentFilteredList = [];   // array of words based on units+mode
  let currentIndex = 0;
  let currentWordObj = null;
  let isRevealed = false;

  // UI state
  let selectedUnits = new Set();     // store unit numbers (e.g., 7,8,9)
  let currentMode = "selected";      // 'selected', 'all', 'unlearned'

  // DOM elements
  const unitsContainer = document.getElementById("unitsContainer");
  const totalSpan = document.getElementById("totalWordsCount");
  const learnedSpan = document.getElementById("learnedCount");
  const remainingSpan = document.getElementById("remainingCount");
  const resetProgressBtn = document.getElementById("resetAllProgressBtn");
  const wordOriginalEl = document.getElementById("wordOriginal");
  const partOfSpeechEl = document.getElementById("partOfSpeech");
  const revealBlock = document.getElementById("revealBlock");
  const translationTextEl = document.getElementById("translationText");
  const exampleTextEl = document.getElementById("exampleText");
  const revealBtn = document.getElementById("revealBtn");
  const actionButtonsDiv = document.getElementById("actionButtons");
  const knowBtn = document.getElementById("knowBtn");
  const dontKnowBtn = document.getElementById("dontKnowBtn");
  const progressMsgSpan = document.getElementById("progressMsg");
  const modeBtns = document.querySelectorAll(".mode-btn");

  // ----- helper: load/save learned to localStorage -----
  function loadLearnedFromStorage() {
    const stored = localStorage.getItem("lexicore_learned_ids");
    if (stored) {
      try {
        const arr = JSON.parse(stored);
        learnedSet = new Set(arr);
      } catch(e) { learnedSet = new Set(); }
    } else {
      learnedSet = new Set();
    }
  }

  function persistLearned() {
    const arr = Array.from(learnedSet);
    localStorage.setItem("lexicore_learned_ids", JSON.stringify(arr));
    updateStats();
  }

  // stats update
  function updateStats() {
    const total = vocabulary.length;
    const learnedCount = vocabulary.filter(w => learnedSet.has(w.id)).length;
    const remainingCount = total - learnedCount;
    totalSpan.innerText = total;
    learnedSpan.innerText = learnedCount;
    remainingSpan.innerText = remainingCount;
    // also update progress message if needed
    if (currentFilteredList.length === 0) {
      progressMsgSpan.innerText = "✨ No words in current filter. Adjust units or mode.";
    } else {
      const currentLearnedInFilter = currentFilteredList.filter(w => learnedSet.has(w.id)).length;
      progressMsgSpan.innerText = `📌 session: ${currentIndex+1} / ${currentFilteredList.length} words | ${currentLearnedInFilter} learned in this set`;
    }
  }

  // build filtered list based on selectedUnits & mode
  function buildFilteredList() {
    let baseWords = [];
    if (selectedUnits.size === 0) {
      // if no units selected, fallback to all (but we can treat as empty)
      baseWords = [];
    } else {
      baseWords = vocabulary.filter(word => selectedUnits.has(word.unit));
    }

    if (currentMode === "all") {
      if (selectedUnits.size === 0) baseWords = [...vocabulary];
      else baseWords = vocabulary.filter(word => selectedUnits.has(word.unit));
    } 
    else if (currentMode === "selected") {
      // already baseWords selected by unit filter
      if (selectedUnits.size === 0) baseWords = [];
    } 
    else if (currentMode === "unlearned") {
      let filteredByUnit = (selectedUnits.size === 0) ? [...vocabulary] : vocabulary.filter(word => selectedUnits.has(word.unit));
      baseWords = filteredByUnit.filter(word => !learnedSet.has(word.id));
    }

    // remove duplicates? none.
    currentFilteredList = baseWords;
    if (currentFilteredList.length === 0) {
      currentIndex = 0;
      currentWordObj = null;
      renderEmptyState();
    } else {
      // reset index to 0 if index out of range
      if (currentIndex >= currentFilteredList.length) currentIndex = 0;
      currentWordObj = currentFilteredList[currentIndex];
      renderCurrentWord();
    }
    updateStats();
  }

  function renderEmptyState() {
    wordOriginalEl.innerText = "✨ No words";
    partOfSpeechEl.innerText = "";
    revealBlock.classList.add("hidden");
    translationTextEl.innerText = "";
    exampleTextEl.innerText = "";
    actionButtonsDiv.style.display = "none";
    revealBtn.style.display = "block";
    progressMsgSpan.innerText = "⚠️ Adjust unit selection or mode to start learning.";
    isRevealed = false;
  }

  function renderCurrentWord() {
    if (!currentWordObj || currentFilteredList.length === 0) {
      renderEmptyState();
      return;
    }
    wordOriginalEl.innerText = currentWordObj.original;
    partOfSpeechEl.innerText = currentWordObj.part_of_speech ? `(${currentWordObj.part_of_speech})` : "";
    // reset reveal area
    revealBlock.classList.add("hidden");
    translationTextEl.innerText = "";
    exampleTextEl.innerText = "";
    isRevealed = false;
    revealBtn.style.display = "block";
    actionButtonsDiv.style.display = "none";
    // update progress text
    const learnedCountInSet = currentFilteredList.filter(w => learnedSet.has(w.id)).length;
    progressMsgSpan.innerText = `📖 ${currentIndex+1} / ${currentFilteredList.length} | ✅ learned in filter: ${learnedCountInSet}`;
  }

  function revealTranslation() {
    if (!currentWordObj) return;
    translationTextEl.innerText = currentWordObj.translation_ru;
    const exampleRaw = currentWordObj.example || "No example provided.";
    exampleTextEl.innerText = `📖 Example: ${exampleRaw}`;
    revealBlock.classList.remove("hidden");
    revealBtn.style.display = "none";
    actionButtonsDiv.style.display = "flex";
    isRevealed = true;
  }

  function markAsKnown() {
    if (!currentWordObj) return;
    if (!learnedSet.has(currentWordObj.id)) {
      learnedSet.add(currentWordObj.id);
      persistLearned();
    }
    moveToNextWord();
  }

  function markAsUnknown() {
    if (!currentWordObj) return;
    // if word is learned we remove from learned set (optional: but user says "don't know" marks as not learned)
    if (learnedSet.has(currentWordObj.id)) {
      learnedSet.delete(currentWordObj.id);
      persistLearned();
    }
    moveToNextWord();
  }

  function moveToNextWord() {
    if (currentFilteredList.length === 0) {
      buildFilteredList(); // rebuild safety
      return;
    }
    // move to next index circular? but better to go next, if end -> loop or notify?
    if (currentIndex + 1 < currentFilteredList.length) {
      currentIndex++;
      currentWordObj = currentFilteredList[currentIndex];
      renderCurrentWord();
    } else {
      // reached end, loop from start
      if (currentFilteredList.length > 0) {
        currentIndex = 0;
        currentWordObj = currentFilteredList[currentIndex];
        renderCurrentWord();
        progressMsgSpan.innerText = "🔄 End of set! Looping from start. 🎉";
        setTimeout(() => updateStats(), 200);
      } else {
        renderEmptyState();
      }
    }
    updateStats();
  }

  // reset progress: clear learnedSet for all words
  function resetAllProgress() {
    if (confirm("⚠️ Reset ALL learned words? This cannot be undone.")) {
      learnedSet.clear();
      persistLearned();
      // rebuild current list to reflect unlearned if mode=unlearned
      buildFilteredList();
      updateStats();
    }
  }

  // render unit chips (dynamic from vocabulary distinct units)
  function renderUnits() {
    const unitsSet = new Set();
    vocabulary.forEach(w => unitsSet.add(w.unit));
    const sortedUnits = Array.from(unitsSet).sort((a,b) => a-b);
    unitsContainer.innerHTML = "";
    sortedUnits.forEach(unit => {
      const chip = document.createElement("div");
      chip.classList.add("unit-chip");
      if (selectedUnits.has(unit)) chip.setAttribute("data-selected", "true");
      else chip.removeAttribute("data-selected");
      chip.innerText = `Unit ${unit}`;
      chip.addEventListener("click", (e) => {
        e.stopPropagation();
        if (selectedUnits.has(unit)) {
          selectedUnits.delete(unit);
          chip.removeAttribute("data-selected");
        } else {
          selectedUnits.add(unit);
          chip.setAttribute("data-selected", "true");
        }
        // reset index for seamless experience
        currentIndex = 0;
        buildFilteredList();
      });
      unitsContainer.appendChild(chip);
    });
    if (sortedUnits.length === 0) unitsContainer.innerHTML = "<div style='padding:8px'>No units found.</div>";
  }

  // mode switching
  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll(".mode-btn").forEach(btn => {
      if (btn.getAttribute("data-mode") === mode) btn.classList.add("active-mode");
      else btn.classList.remove("active-mode");
    });
    currentIndex = 0;
    buildFilteredList();
  }

  // initialization: load vocabulary from hardcoded data (simulate data.json)
  function initData() {
    // clone raw data to avoid reference
    vocabulary = RAW_DATA.map(item => ({ ...item }));
    loadLearnedFromStorage();
    // default selected units: all units present? but for better UX select unit 8 and 7? we'll select unit 8 by default
    const distinctUnits = [...new Set(vocabulary.map(w => w.unit))];
    if (distinctUnits.length) {
      // pre-select first unit (or unit 8 if exists)
      if (distinctUnits.includes(8)) selectedUnits.add(8);
      else selectedUnits.add(distinctUnits[0]);
      // optionally add another for demo? but simple
    }
    renderUnits();
    setMode("selected");   // default mode
    updateStats();
  }

  // Event listeners
  revealBtn.addEventListener("click", revealTranslation);
  knowBtn.addEventListener("click", markAsKnown);
  dontKnowBtn.addEventListener("click", markAsUnknown);
  resetProgressBtn.addEventListener("click", resetAllProgress);
  modeBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      const mode = btn.getAttribute("data-mode");
      if (mode === "selected") setMode("selected");
      else if (mode === "all") setMode("all");
      else if (mode === "unlearned") setMode("unlearned");
    });
  });

  // start everything
  initData();
</script>
</body>
</html>
